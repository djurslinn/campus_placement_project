# ── Render Blueprint ──────────────────────────────────────────────────────
# Push this repo to GitHub, then go to https://render.com/deploy
# and connect the repo.  Render reads this file automatically.

databases:
  - name: campus-placement-db
    plan: free
    databaseName: campus_placement
    user: campus_user

services:
  # ── Django Web Service ────────────────────────────────────────────────
  - type: web
    name: campus-placement-web
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn campus_placement.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: campus-placement-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.10.12"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
