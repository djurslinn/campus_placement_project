<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            color: #222;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        h2 {
            border-bottom: 2px solid #333;
            padding-bottom: 4px;
            margin-top: 25px;
        }
        .section {
            margin-top: 15px;
        }
        ul {
            padding-left: 18px;
        }
    </style>
</head>
<body>

<h1>{{ resume.full_name }}</h1>

<div class="section">
    <h2>Skills</h2>
    <p>{{ resume.skills }}</p>
</div>

<div class="section">
    <h2>Education</h2>
    <p>{{ resume.education }}</p>
</div>

<div class="section">
    <h2>Projects</h2>
    <p>{{ resume.projects }}</p>
</div>

<div class="section">
    <h2>Experience</h2>
    <p>{{ resume.experience }}</p>
</div>

</body>
</html>
