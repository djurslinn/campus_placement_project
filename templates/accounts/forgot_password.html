{% extends "student_base.html" %}

{% block title %}Forgot Password - CPTS{% endblock %}

{% block content %}
<div class="registration-header" style="text-align: center; margin-bottom: 2rem;">
    <h2 style="color: #4f46e5; font-size: 1.8rem; margin-bottom: 0.5rem;">Forgot Password?</h2>
    <p style="color: #64748b; font-size: 0.95rem;">Enter your registered email to receive an OTP.</p>
</div>

<form method="POST">
    {% csrf_token %}
    <div class="form-group" style="margin-bottom: 1.5rem;">
        <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #1e293b; font-size: 0.9rem;">Email Address</label>
        <input type="email" name="email" id="email" required 
               style="width: 100%; padding: 0.9rem; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; transition: all 0.2s ease;">
    </div>

    <button type="submit" class="btn-primary" style="width: 100%; padding: 1rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);">
        Send Reset OTP
    </button>
</form>

<div class="footer-links" style="margin-top: 2.5rem; text-align: center; border-top: 1px solid #f1f5f9; padding-top: 1.5rem;">
    <a href="{% url 'index' %}" style="color: #4f46e5; text-decoration: none; font-weight: 700; font-size: 0.95rem;">
        <i class="ri-arrow-left-line"></i> Back to Login
    </a>
</div>

<style>
    input:focus {
        outline: none;
        border-color: #4f46e5;
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }
</style>
{% endblock %}
