{% extends "student_base.html" %}

{% block title %}Reset Password - CPTS{% endblock %}

{% block content %}
<div class="registration-header" style="text-align: center; margin-bottom: 2rem;">
    <h2 style="color: #4f46e5; font-size: 1.8rem; margin-bottom: 0.5rem;">New Password</h2>
    <p style="color: #64748b; font-size: 0.95rem;">Create a strong password for your account.</p>
</div>

<form method="POST">
    {% csrf_token %}
    <div class="form-group" style="margin-bottom: 1.5rem;">
        <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #1e293b; font-size: 0.9rem;">New Password</label>
        <div class="password-container">
            <input type="password" name="password" id="password" required 
                   style="width: 100%; padding: 0.9rem; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; transition: all 0.2s ease;">
            <i class="fas fa-eye toggle-password" onclick="togglePass('password', this)"></i>
        </div>
    </div>

    <div class="form-group" style="margin-bottom: 1.5rem;">
        <label for="confirm_password" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #1e293b; font-size: 0.9rem;">Confirm Password</label>
        <div class="password-container">
            <input type="password" name="confirm_password" id="confirm_password" required 
                   style="width: 100%; padding: 0.9rem; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; transition: all 0.2s ease;">
            <i class="fas fa-eye toggle-password" onclick="togglePass('confirm_password', this)"></i>
        </div>
    </div>

    <button type="submit" class="btn-primary" style="width: 100%; padding: 1rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);">
        Update Password
    </button>
</form>

<style>
    input:focus {
        outline: none;
        border-color: #4f46e5;
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }

    /* Password Toggle */
    .password-container { position: relative; }
    .toggle-password {
        position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
        color: #94a3b8; cursor: pointer; font-size: 1.1rem; transition: color 0.2s; z-index: 100;
    }
    .toggle-password:hover { color: #4f46e5; }
</style>

<script>
    function togglePass(id, icon) {
        const input = document.getElementById(id);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
</script>
{% endblock %}
