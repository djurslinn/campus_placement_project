<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Campus Placement Training System</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .btn-container {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .help-text {
            display: block;
            font-size: 0.85em;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <div class="dashboard-wrapper">
        <!-- Sidebar Include -->
        {% include 'menu_coordinator.html' %}

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <header class="dashboard-header">
                <h1>{{ title }}</h1>
                <div class="user-info">
                    <a href="{% url 'logout' %}" class="btn-logout">Logout</a>
                </div>
            </header>

            <section class="content-section">
                <div class="form-container">
                    <form method="POST">
                        {% csrf_token %}
                        {% for field in form %}
                        <div class="form-group">
                            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                            {{ field }}
                            {% if field.help_text %}
                            <small class="help-text">{{ field.help_text }}</small>
                            {% endif %}
                            {% if field.errors %}
                            <div class="alert alert-danger" style="margin-top: 5px; padding: 5px 10px;">
                                {{ field.errors }}
                            </div>
                            {% endif %}
                        </div>
                        {% endfor %}

                        <div class="btn-container">
                            <button type="submit" class="btn btn-primary">Save Course</button>
                            <a href="{% url 'manage_courses' %}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </section>

            <!-- Footer -->
            <footer class="dashboard-footer">
                <p>&copy; 2024 Campus Placement Training System</p>
            </footer>
        </div>
    </div>
</body>

</html>
