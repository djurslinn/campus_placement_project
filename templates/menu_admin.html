<!-- Mobile Toggle Button -->
<button class="sidebar-toggle" onclick="toggleSidebar()">
    <i class="fas fa-bars"></i>
</button>

<!-- Overlay for mobile -->
<div class="overlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header" style="background: linear-gradient(135deg, #1e293b 0%, #334155 100%);">
        <h2>Campus Placement Training System</h2>
        <p style="color: #ef4444; font-weight: 700;">System Admin</p>
    </div>
    <nav class="sidebar-menu">
        <a href="{% url 'admin_dashboard' %}"
            class="menu-item {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
            <i class="fas fa-shield-alt"></i>
            <span>System Dashboard</span>
        </a>
        
        <div class="menu-label" style="padding: 15px 25px 5px; font-size: 0.7rem; text-transform: uppercase; color: #94a3b8; font-weight: 800; letter-spacing: 0.05em;">Access Control</div>
        
        <a href="{% url 'admin_user_management' %}" class="menu-item {% if request.resolver_match.url_name == 'admin_user_management' %}active{% endif %}">
            <i class="fas fa-user-shield"></i>
            <span>Manage Users</span>
        </a>
        <a href="{% url 'security_overview' %}" class="menu-item {% if request.resolver_match.url_name == 'security_overview' %}active{% endif %}">
            <i class="fas fa-shield-alt"></i>
            <span>Security Overview</span>
        </a>
        <a href="/admin/auth/group/" class="menu-item">
            <i class="fas fa-users-cog"></i>
            <span>Groups & Permissions</span>
        </a>

        <div class="menu-label" style="padding: 15px 25px 5px; font-size: 0.7rem; text-transform: uppercase; color: #10b981; font-weight: 800; letter-spacing: 0.05em;">Database & Logs</div>
        
        <a href="{% url 'admin_manage_courses' %}" class="menu-item {% if request.resolver_match.url_name == 'admin_manage_courses' %}active{% endif %}">
            <i class="fas fa-building"></i>
            <span>Manage Departments</span>
        </a>
        <a href="/admin/" class="menu-item">
            <i class="fas fa-database"></i>
            <span>Raw Database Access</span>
        </a>
        

    </nav>
</aside>

<script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.querySelector('.overlay');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
    }
</script>
